<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cats Gallery</title>
    <style>
        .gallery {
            width: 500px;
            border: 1px solid #ccc;
            margin: 20px auto;
            text-align: center;
        }

        h2 {
            border-bottom: 1px solid #ccc;
            padding: 10px;
            margin: 0;
        }

        .main-view {
            padding: 30px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-view img {
            max-width: 100%;
            max-height: 100%;
        }

        .nav-bar {
            display: flex;
            border-top: 1px solid #ccc;
        }

        .nav-bar a {
            flex: 1;
            padding: 10px;
            border-right: 1px solid #ccc;
            text-decoration: none;
        }

        .nav-bar a:last-child {
            border-right: none;
        }

        .nav-bar a:hover {
            background-color: #f0f0f0;
        }

        .nav-bar img {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>

<div class="gallery">
    <h2>CATS GALLERY</h2>

    <div class="main-view">
        <img src="cat6.jpg">
    </div>

    <div class="nav-bar">
        <a href="page1cats.html"><img src="cat1.jpg"></a>
        <a href="page2cats.html"><img src="cat2.jpg"></a>
        <a href="page3cats.html"><img src="cat3.jpeg"></a>
        <a href="page4cats.html"><img src="cat4.jpg"></a>
        <a href="page5cats.html"><img src="cat5.jpg"></a>
        <a href="page6cats.html"><img src="cat6.jpg"></a>
    </div>
</div>
</body>
</html>
