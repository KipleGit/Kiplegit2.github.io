<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruits</title>
    <style>
        .fruit-list {
            background-color: #fccdd5;
            padding: 20px;
            width: 500px;
            list-style: none;
        }
        .fruit-list li {
            background-color: #d47a8a;
            margin-bottom: 10px;
            padding: 10px;
            display: flex;
            align-items: center;
            color: white;
        }
        .text-bg {
            background-color: #882233;
            padding: 5px 15px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
  <ul class="fruit-list">
  <li><span>1.</span> <span class="text-bg">Apple</span></li>
  <li><span>2.</span> <span class="text-bg">Orange</span></li>
  <li><span>3.</span> <span class="text-bg">Pineapple</span></li>
  <li><span>4.</span> <span class="text-bg">Pear</span></li>
  <li><span>5.</span> <span class="text-bg">Cherry</span></li>
</ul>
</body>
</html>
