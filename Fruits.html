<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fruit List</title>
    <style>
        .fruit-list {
            background-color: #fccdd5;
            padding: 30px;
            width: 500px;
            list-style: none;
            counter-reset: num;
        }

        .fruit-list li {
            background-color: #d47a8a;
            margin-bottom: 10px;
            padding: 10px;
            color: white;
            font-family: sans-serif;
            display: flex;
            align-items: center;
        }

        .fruit-list li::before {
            counter-increment: num;
            content: counter(num) ".";
            background-color: #882233;
            padding: 5px 15px;
            margin-right: 20px;
            min-width: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<ul class="fruit-list">
    <li>Apple</li>
    <li>Orange</li>
    <li>Pineapple</li>
    <li>Pear</li>
    <li>Cherry</li>
</ul>

</body>
</html>
